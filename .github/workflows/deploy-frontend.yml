name: Deploy Frontend a GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Instalar dependencias
        run: pnpm install --no-frozen-lockfile

      - name: Build del frontend
        working-directory: artifacts/horario-secretarias
        env:
          PORT: "5173"
          BASE_PATH: "/Emilia-alarcon1/"
          VITE_API_URL: https://workspaceapi-server-production-5bd0.up.railway.app
          NODE_ENV: production
        run: pnpm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir archivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/horario-secretarias/dist

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
